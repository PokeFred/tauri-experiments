name: Development

on:
    push:
        branches:
            - main

jobs:
    build:
        name: Build
        runs-on: ubuntu-20.04
        steps:
            -   name: Checkout Repository
                uses: actions/checkout@v4
            -   name: Setup NodeJS
                uses: actions/setup-node@v4
                with:
                    node-version: 18
            -   name: Install Frontend Dependencies
                run: npm install
            -   name: Build Application
                run: npm run frontend:build
            -   name: g
                uses: actions/upload-artifact@v4
                with:
                    name: build-frontend
                    path: ./build
    linux-ubuntu-20-04:
        name: 'Build Linux (Ubuntu 20.04)'
        needs: build
        runs-on: ubuntu-20.04
        steps:
            -   name: Checkout Repository
                uses: actions/checkout@v4
            -   name: Setup NodeJS
                uses: actions/setup-node@v4
                with:
                    node-version: 18
    linux-ubuntu-22-04:
        name: 'Build Linux (Ubuntu 22.04)'
        needs: build
        runs-on: ubuntu-22.04
        steps:
            -   name: Checkout Repository
                uses: actions/checkout@v4
            -   name: Setup NodeJS
                uses: actions/setup-node@v4
                with:
                    node-version: 18

